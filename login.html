<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureCourse - Login</title>
  <link rel="icon" href="./image/secure_course_icon.png">
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="login-container">
    <div class="login-form-side">
      <div class="form-wrapper">
        <div class="logo-container">
          <img src="./image/secure_course_icon.png" alt="logo">
          <h3>SecureCourse</h3>
        </div>
        <div class="welcome-text">
          <h1>Welcome Back</h1>
        </div>
        <form>
          <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Example@email.com" required>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="at least 8 characters" required>
          </div>

          <div class="forgot-password">
            <a href="#">Forgot Password?</a>
          </div>
          <a href="./dashboard.html" class="signin-btn">Sign in</a>
        </form>

        <p class="signup-text">
          Don't you have an account? <a href="./index.html">Sign up</a>
        </p>
      </div>
    </div>

    <div class="login-image-side">
      <img src="./image/login_art.png" alt="">
    </div>
  </div>

  <script src="login.js"></script>
</body>

</html>
