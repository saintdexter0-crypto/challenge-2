<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Course</title>
    <link rel="icon" href="./image/secure_course_icon.png">
    <link rel="stylesheet" href="stylesc.css">
    <script defer src="style.js"></script>
</head>
<body>
    <!-- main_container -->

    <div class="maincontainer">
        
        <div class="header">

            <div class="logo">
                <img src="./image/secure_course_icon.png" alt="logo">
                <h3>SecureCourse</h3>
            </div>

            <div class="login_options">

                <div class="option">
                    <h1 class="greetings">Hello!</h1>
                    <p class="subtitle">Choose your login option</p>
                </div>

                <div class="student_portal">
                    <a href="./login.html">
                    <div class="portal">
                        <h2 class="card_title">Student</h2>
                        <p class="card_content"> the students' portal here.</p>
                    </div>
                    <div class="go">
                         <img src="./image/arrow_forward.png" alt="arrow">
                    </div>
                    </a>
                </div>

                <div class="staff">
                    <a href="./login.html">
                    <div class="staff_title">
                    <h2 class="title">Staff</h2>
                    <p class="content">Exclusive to staff members only.</p>
                    </div>
                    <div class="go_in">
                         <a href=""><img src="image/arrow_forward.png" alt="arrow"></a>
                    </div>
                    </a>
                </div>

            </div>

        </div>

        <div class="login_art">
            <img src="./image/login_art.png" alt="photo">
        </div>

    </div>


</body>
</html>
